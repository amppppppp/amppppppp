<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Pages Site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 16px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }
    .badge {
      display: inline-block;
      background-color: #22c55e;
      color: #052e16;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 9999px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    button:hover {
      background-color: #2563eb;
    }
    button:active {
      transform: scale(0.98);
    }
    #counter {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Live on GitHub Pages</div>
    <h1>Hello, World! 👋</h1>
    <p>This page is hosted for free directly on GitHub Pages. You can edit this file anytime to update your website.</p>
    
    <button id="clickBtn">Click Me!</button>
    <div id="counter">Button clicked 0 times</div>
  </div>

  <script>
    let count = 0;
    const btn = document.getElementById('clickBtn');
    const counterDisplay = document.getElementById('counter');

    btn.addEventListener('click', () => {
      count++;
      counterDisplay.textContent = `Button clicked ${count} time${count === 1 ? '' : 's'}`;
    });
  </script>

</body>
</html>
